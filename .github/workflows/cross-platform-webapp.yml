name: "Scenario: Cross-Platform Webapp"

on:
  push:
    paths:
      - "scenarios/cross-platform-webapp/**"
      - ".github/workflows/cross-platform-webapp.yml"
      - ".github/actions/setup-dotnetup/**"
  pull_request:
    paths:
      - "scenarios/cross-platform-webapp/**"
      - ".github/workflows/cross-platform-webapp.yml"
      - ".github/actions/setup-dotnetup/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: scenarios/cross-platform-webapp

env:
  LOCAL_INSTALL_ROOT: ${{ github.workspace }}/.dotnet

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnetup
        uses: ./.github/actions/setup-dotnetup

      # dotnetup reads the global.json and installs the pinned SDK version.
      # The same command works identically on every platform — this is
      # the key value proposition for cross-platform teams.
      - name: Install .NET SDK via dotnetup
        run: dotnetup install --install-path ${{ env.LOCAL_INSTALL_ROOT }} --manifest-path .dotnetup.json

      - name: Setup dotnetup hive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "DOTNET_ROOT=${{ env.LOCAL_INSTALL_ROOT }}" >> "$GITHUB_ENV" \
          && echo "${{ env.LOCAL_INSTALL_ROOT }}" >> "$GITHUB_PATH"

      - name: Setup dotnetup hive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "DOTNET_ROOT=${{ env.LOCAL_INSTALL_ROOT }}" >> $env:GITHUB_ENV;
          echo "${{ env.LOCAL_INSTALL_ROOT }}" >> $env:GITHUB_PATH;

      - name: show install root contents
        if: runner.os != 'Windows'
        run: ls -la ${{ env.LOCAL_INSTALL_ROOT }}

      - name: show install root contents
        if: runner.os == 'Windows'
        run: ls ${{ env.LOCAL_INSTALL_ROOT }}

      - name: Show dotnet install
        if: runner.os == 'Windows'
        run: |
          echo $env:PATH;
          dotnet --info

      - name: Show dotnet install
        if: runner.os != 'Windows'
        run: |
          echo $PATH && \
          dotnet --info

      - name: Publish
        working-directory: scenarios/cross-platform-webapp/src/MyApp.Web
        run: dotnet publish
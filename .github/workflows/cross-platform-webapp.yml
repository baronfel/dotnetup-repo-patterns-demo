name: "Scenario: Cross-Platform Webapp"

on:
  push:
    paths:
      - "scenarios/cross-platform-webapp/**"
      - ".github/workflows/cross-platform-webapp.yml"
      - ".github/actions/setup-dotnetup/**"
  pull_request:
    paths:
      - "scenarios/cross-platform-webapp/**"
      - ".github/workflows/cross-platform-webapp.yml"
      - ".github/actions/setup-dotnetup/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: scenarios/cross-platform-webapp

env:
  LOCAL_INSTALL_ROOT: .dotnet

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnetup
        uses: ./.github/actions/setup-dotnetup
        with:
          dotnet-install-root: ${{ env.LOCAL_INSTALL_ROOT }}

      - name: Show dotnet install
        if: runner.os == 'Windows'
        run: |
          dotnet --info

      - name: Show dotnet install
        if: runner.os != 'Windows'
        run: |
          dotnet --info

      - name: Publish
        working-directory: scenarios/cross-platform-webapp/src/MyApp.Web
        run: dotnet publish
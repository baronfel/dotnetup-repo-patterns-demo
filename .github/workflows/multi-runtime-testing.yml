name: "Scenario: Multi-Runtime Testing"

on:
  push:
    paths:
      - "scenarios/multi-runtime-testing/**"
      - ".github/workflows/multi-runtime-testing.yml"
      - ".github/actions/setup-dotnetup/**"
  pull_request:
    paths:
      - "scenarios/multi-runtime-testing/**"
      - ".github/workflows/multi-runtime-testing.yml"
      - ".github/actions/setup-dotnetup/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: scenarios/multi-runtime-testing

env:
  LOCAL_INSTALL_ROOT: ${{ github.workspace }}/.dotnet

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnetup
        uses: ./.github/actions/setup-dotnetup

      - name: Install .NET SDK via dotnetup
        run: dotnetup install --install-path ${{ env.LOCAL_INSTALL_ROOT }} --manifest-path .dotnetup.json

      - name: Setup dotnetup hive
        run: |
          echo "DOTNET_ROOT=${{ env.LOCAL_INSTALL_ROOT }}" >> "$GITHUB_ENV" \
          && echo "PATH=${{ env.LOCAL_INSTALL_ROOT }}:${PATH}" >> "$GITHUB_ENV"

      # Install the runtimes listed in global.json's "runtimes.dotnet" array.
      # The SDK already provides the runtime matching its major version, so
      # we filter that out and install the rest.
      - name: Install additional runtimes for test targets
        run: |
          sdk_major=$(jq -r '.sdk.version | split(".")[0]' global.json)
          args=$(jq -r '.runtimes.dotnet[]' global.json | while read -r version; do
            major=$(echo "$version" | cut -d. -f1)
            if [ "$major" != "$sdk_major" ]; then
              echo "runtime@$version"
            fi
          done | tr '\n' ' ')
          echo "Installing runtimes: $args"
          dotnetup runtime install $args --install-path ${{ env.LOCAL_INSTALL_ROOT }} --manifest-path .dotnetup.json

      # Tests run against all three target frameworks (net8.0, net9.0, net10.0).
      # Because dotnetup installed all the required runtimes, this Just Works™.
      - name: Test (all target frameworks)
        working-directory: scenarios/multi-runtime-testing/test/MyLib.Tests
        run: dotnet test

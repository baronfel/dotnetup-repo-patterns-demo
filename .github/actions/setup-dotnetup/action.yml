name: 'Setup dotnetup'
description: 'Builds dotnetup from source (dotnet/sdk release/dnup branch) and adds it to PATH'

inputs:
  dotnet-install-root:
    description: 'The directory where .NET toolchains should be installed. This is typically a local directory within the repo, like .dotnet., or a user-global directory like ~/.dotnet'
    required: false
    default: '.dotnet'
  dotnetup-manifest-path:
    description: 'Path to the dotnetup manifest file that describes the "current" install state. If not provided, the action will create one in default, user-global locations.'
    required: false
    default: '.dotnetup.json'

runs:
  using: 'composite'
  steps:
    - name: Clone dotnet/sdk (Noah's walkthrough branch)
      shell: bash
      run: |
        git clone --depth 1 --branch nagilson-dnup-walkthrough-ux https://github.com/nagilson/sdk.git "${{ runner.temp }}/dotnet-sdk" && \
        cd "${{ runner.temp }}/dotnet-sdk"

    - name: Restore toolsets
      if: runner.os != 'Windows'
      shell: bash
      run: |
        . "${{ runner.temp }}/dotnet-sdk/eng/common/tools.sh" \
        && . "${{ runner.temp }}/dotnet-sdk/eng/configure-toolset.sh" \
        && . "${{ runner.temp }}/dotnet-sdk/eng/restore-toolset.sh"

    - name: Restore toolsets
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        . "${{ runner.temp }}/dotnet-sdk/eng/common/tools.ps1";
        . "${{ runner.temp }}/dotnet-sdk/eng/configure-toolset.ps1";
        . "${{ runner.temp }}/dotnet-sdk/eng/restore-toolset.ps1";

    - name: Publish dotnetup (NativeAOT)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        ${{ runner.temp }}/dotnet-sdk/.dotnet/dotnet publish \
          "${{ runner.temp }}/dotnet-sdk/src/Installer/dotnetup" \
          -c Release \
          -o "${{ runner.temp }}/dotnetup-bin"

    - name: Publish dotnetup (NativeAOT)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        ${{ runner.temp }}/dotnet-sdk/.dotnet/dotnet.exe publish `
          "${{ runner.temp }}/dotnet-sdk/src/Installer/dotnetup" `
          -c Release `
          -o "${{ runner.temp }}/dotnetup-bin"

    - name: Add dotnetup to PATH
      shell: bash
      run: |
        echo "${{ runner.temp }}/dotnetup-bin" >> "$GITHUB_PATH"

    - name: Setup dotnetup install root
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "DOTNET_ROOT=${{ inputs.dotnet-install-root }}" >> "$GITHUB_ENV" \
        && echo "${{ inputs.dotnet-install-root }}" >> "$GITHUB_PATH"

    - name: Setup dotnetup install root
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "DOTNET_ROOT=${{ inputs.dotnet-install-root }}" >> $env:GITHUB_ENV;
        echo "${{ inputs.dotnet-install-root }}" >> $env:GITHUB_PATH;

    - name: install sdk via dotnetup
      shell: bash
      run: dotnetup install --install-path ${{ inputs.dotnet-install-root }} --manifest-path ${{ inputs.dotnetup-manifest-path }}

    - name: discover global.json
      shell: bash
      run:
        if [ -f global.json ]; then
          echo "global_json_exists=true" >> "$GITHUB_OUTPUT"
          echo "global_json_path=$(pwd)/global.json" >> "$GITHUB_OUTPUT"
        else
          echo "global_json_exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: install runtimes if present in global.json
      if: steps.discover_global_json.outputs.global_json_exists == 'true'
      shell: bash
      run: |
        global_json="${{ steps.discover_global_json.outputs.global_json_path }}"
        sdk_major=$(jq -r '.sdk.version | split(".")[0]' "$global_json")
        args=$(jq -r '
          .runtimes // {} |
          to_entries[] |
          . as $entry |
          $entry.value[] |
          [$entry.key, .] | join("@")
        ' "$global_json" | while read -r spec; do
          kind="${spec%%@*}"
          version="${spec##*@}"
          major=$(echo "$version" | cut -d. -f1)
          # Skip the runtime type that already ships with the SDK (dotnet@<sdk_major>)
          if [ "$kind" != "dotnet" ] || [ "$major" != "$sdk_major" ]; then
            echo "$spec"
          fi
        done | tr '\n' ' ')
        echo "Installing runtimes: $args"
        dotnetup runtime install $args --install-path ${{ inputs.dotnet-install-root }} --manifest-path ${{ inputs.dotnetup-manifest-path }}

    - name: List install contents when debugging
      if: env.RUNNER_DEBUG == '1'
      shell: bash
      run: |
        ls -la "${{ inputs.dotnet-install-root }}"

